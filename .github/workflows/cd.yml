name: CD

on:
  push:
    branches:
      - master

env:
  # Oracle Container Registry path: <region>.ocir.io/<tenancy-namespace>/go-shorten
  IMAGE: ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/go-shorten

jobs:
  build-and-push:
    name: Build and push image to OCIR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Oracle Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGION }}.ocir.io
          # format: <tenancy-namespace>/<oci-username>
          username: ${{ secrets.OCI_REGISTRY_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to OCI Compute
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          script: |
            # Log in to OCIR
            echo "${{ secrets.OCI_AUTH_TOKEN }}" | \
              docker login ${{ secrets.OCI_REGION }}.ocir.io \
                -u ${{ secrets.OCI_REGISTRY_USERNAME }} --password-stdin

            # Pull latest image
            docker pull ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/go-shorten:latest

            # Stop and remove old container if exists
            docker stop go-shorten || true
            docker rm   go-shorten || true

            # Start new container
            docker run -d \
              --name go-shorten \
              --restart always \
              -p 8080:8080 \
              -e GIN_MODE=release \
              -e HOST=0.0.0.0 \
              -e PORT=8080 \
              -e BASE_URL=${{ secrets.BASE_URL }} \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/go-shorten:latest

            # Remove dangling images
            docker image prune -f
